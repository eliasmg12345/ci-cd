name: 02 - Manual

on:
  workflow_dispatch:
    inputs:
      log_level:
        description: "Nivel de log"
        required: true
        default: "info"
        type: choice
        options:
          - info
          - debug
          - warn
          - error
      
      environment:
        description: "Entorno"
        type: environment
      
      dry_run:
        description: "Ejecutar sin aplicar los cambios"
        required: false
        default: false
        type: boolean
      
      reason:
        description: "Motivod de ejecución"
        required: false
        default: "Manual execution"
        type: string
    
jobs:
  manual:
    runs-on: ubuntu-24.04
    steps:
      - name: Mostrar todos los inputs
        env:
          LOG_LEVEL: ${{inputs.log_level}}
          ENVIRONMENT: ${{inputs.environment}}
          DRY_RUN: ${{inputs.dry_run}}
          REASON: ${{inputs.reason}}
        run: |
          echo "LOG_LEVEL: $LOG_LEVEL"
          echo "ENVIRONMENT: $ENVIRONMENT"
          echo "DRY_RUN: $DRY_RUN"
          echo "REASON: $REASON"
      
      - name: Deploy (solo si no es dry-run)
        if: ${{!inputs.dry_run}}
        env:
          ENVIRONMENT: ${{inputs.environment}}
        run: |
          echo "deploying to $ENVIRONMENT"
      
      - name: solo log si es dry_run
        if: ${{inputs.dry_run}}
        run: |
          echo "dry run: no changes applied"